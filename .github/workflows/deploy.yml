name: Deploy to VPS

on:
  push:
    branches:
      - main
      - feat/cinematic-microanimations

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/earthecho
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            npm install
            npx prisma generate
            npm run build
            systemctl restart earthecho
